name: Secrets DevSecOps Pipeline

# Couvre : build, test, détection de secrets, scan d'image, release.
# Étapes suivantes (Vault, rotation, déploiement) : voir docs/secrets-architecture.md

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # nécessaire pour publier les SARIF dans l'onglet Security
  packages: write # nécessaire pour le job release (push vers ghcr.io)

jobs:
  build-and-test:
    name: Build & test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build & tests unitaires
        run: ./mvnw --no-transfer-progress -B clean test

      - name: Import du secret NVD depuis Vault
        # Même principe de centralisation que pour l'appli : la pipeline va
        # chercher SON secret (la clé NVD) dans Vault plutôt que dans un
        # GitHub Secret classique. VAULT_ADDR pointe vers le tunnel Cloudflare
        # ouvert sur la machine de TP : ce step échoue si le tunnel n'est pas
        # actif au moment du run (limite assumée, propre à une démo).
        id: vault-secrets
        uses: hashicorp/vault-action@v2
        continue-on-error: true
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/ci-secrets nvd_api_key | NVD_API_KEY

      - name: Dependency-Check (SCA)
        # La clé NVD est elle-même un secret à gérer correctement : c'est un bon
        # exemple concret de "secret applicatif" à externaliser dès la CI.
        env:
          NVD_API_KEY: ${{ env.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./mvnw --no-transfer-progress dependency-check:check -DnvdApiKey="$NVD_API_KEY"
          else
            echo "NVD_API_KEY absente : scan SCA ignoré (sera très lent sans clé)."
          fi
        continue-on-error: true

      - name: Archiver les rapports (tests + SCA)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-reports
          path: |
            target/surefire-reports/
            target/dependency-check-report.html
          retention-days: 30

  secret-scan:
    name: Détection de secrets (Gitleaks)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # historique complet : indispensable, Gitleaks scanne aussi git log

      - name: Installer Gitleaks (version épinglée)
        run: |
          wget -qO gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scanner (vs baseline connue)
        # Sur un repo comme wrongsecrets, des centaines de secrets sont volontaires :
        # le baseline évite de bloquer sur du "déjà connu" et ne fait échouer le job
        # que sur de VRAIES nouvelles fuites. Voir gitleaks-baseline-reference.json
        # (généré lors de l'audit initial) à committer sous le nom .gitleaks-baseline.json.
        run: |
          gitleaks detect \
            --source=. \
            --baseline-path=.gitleaks-baseline.json \
            --report-format=sarif \
            --report-path=gitleaks-report.sarif \
            --exit-code=1 \
            --redact

      - name: Publier le SARIF (onglet Security)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Archiver le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 90

  container-scan:
    name: Scan d'image Docker (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Build l'image
        run: docker build -t wrongsecrets:ci --build-arg spring_profile=without-vault .

      - name: Installer Trivy
        # Repo apt officiel : plus fiable que l'action tierce (cf. retour d'expérience
        # du projet lui-même dans son propre pre-commit.yml).
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Scanner l'image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-report.sarif \
            --exit-code 1 \
            wrongsecrets:ci

      - name: Publier le SARIF (onglet Security)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-report.sarif

      - name: Archiver le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif
          retention-days: 90

  release:
    name: Build & push (release)
    runs-on: ubuntu-latest
    needs: [secret-scan, container-scan]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # token éphémère fourni par GitHub, pas de PAT statique à gérer

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            spring_profile=without-vault
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
