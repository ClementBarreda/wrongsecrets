[extend]
useDefault = true

[allowlist]
description = "Fichiers connus de WrongSecrets contenant des secrets volontaires + artefacts du scan"
paths = [
  '''\.gitleaks-baseline\.json''',
  '''gitleaks-report\.(json|sarif)''',
  '''.*\.md$''',
  '''src/test/.*''',
  '''src/main/resources/.*''',
  '''.*\.tf$''',
  '''.*\.tfstate.*''',
  '''.*secrets.*\.json''',
  '''\.github/.*''',
  '''js/.*''',
  '''.*Challenge.*\.java''',
]
